name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 sysmon.py --max-line-length=100 --ignore=E501,E302,W503

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/alerts:/alerts \
            --entrypoint /bin/promtool \
            prom/prometheus:latest \
            check rules /alerts/prometheus-alerts.yml

      - name: Build Docker image
        run: docker build -t finsight-observer:ci .
